name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Copy build to site root
        run: |
          cp dist/index.html index.html
          rm -rf assets
          cp -r dist/assets assets
          cp public/second-cast-paper.pdf ./second-cast-paper.pdf
          touch .nojekyll
      - name: Commit and push built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/ second-cast-paper.pdf .nojekyll
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update GitHub Pages build [skip ci]"
          git push
